[pytest]
testpaths = tests
python_files = test_chunker.py test_preprocess.py test_lang.py test_retriever_pipeline.py test_api.py test_rag_quality.py
addopts = -q
markers =
    realmodels: use the real embedding/reranker models (integration, no stubs)
    realindex: use the real production ChromaDB index (not a temp DB)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
